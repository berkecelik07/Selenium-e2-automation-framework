name: Selenium Automation Tests

# Trigger events for GitHub Actions
on:
  # Trigger on push to main/develop branches
  push:
    branches: [ main, develop ]
  
  # Trigger on pull requests to main/develop branches
  pull_request:
    branches: [ main, develop ]
  
  # Scheduled test execution (CRON - all times in UTC)
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
    
    # Run weekly on Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: false
        default: 'qa'
        type: choice
        options:
          - local
          - dev
          - qa
          - staging

# Environment variables
env:
  MAVEN_VERSION: '3.8.1'
  JAVA_VERSION: '17'

# GitHub Actions - FREE TIER BENEFITS:
# - Unlimited free minutes for public repositories
# - 2000 free minutes/month for private repositories
# - Each job can run for up to 6 hours
# - Each workflow run is up to 35 days
# See: https://docs.github.com/en/actions/usage-limits-billing-and-administration/about-billing-for-github-actions

jobs:
  test:
    name: Run Selenium Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        # Test on multiple Java versions for compatibility
        java-version: ['17']
        browser: ['chrome']
    
    steps:
    # Checkout code
    - name: 📥 Checkout Repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    # Setup Java
    - name: ☕ Set up Java ${{ matrix.java-version }}
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: 'maven'
    
    # Display environment info
    - name: ℹ️ Display Environment Info
      run: |
        echo "=== WORKFLOW TRIGGER INFO ==="
        echo "Event: ${{ github.event_name }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo ""
        echo "=== JAVA & MAVEN VERSION ==="
        java -version
        mvn --version
    
    # Run tests
    - name: 🧪 Run Selenium Tests
      run: mvn clean test -B -Denv=${{ inputs.environment || 'qa' }}
      timeout-minutes: 30
      env:
        # Test data can be set here
        TEST_BROWSER: chrome
        TEST_HEADLESS: false
    
    # Generate test report
    - name: 📊 Generate Test Report
      if: always()
      run: |
        echo "Test execution completed"
        ls -la target/
    
    # Upload test results
    - name: 📤 Upload Test Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: cucumber-reports-${{ matrix.java-version }}
        path: |
          target/cucumber-default-report.html
          screenshots/
        retention-days: 30
    
    # Upload failed test metadata
    - name: 📝 Upload Failed Tests Log
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: failed-tests-${{ matrix.java-version }}
        path: target/failed.txt
        retention-days: 7
    
    # Comment on PR with test results
    - name: 💬 Post Test Results to PR
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const testResults = 'Tests executed successfully';
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `✅ **Selenium Automation Tests Completed** \n\n${testResults}`
          });
    
    # Notify on failure
    - name: 🚨 Notify on Test Failure
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '❌ **Selenium Tests Failed!** Please check the artifacts for detailed reports.'
          })
    
    # Create summary for scheduled runs
    - name: 📋 Create Test Summary
      if: always()
      run: |
        echo "# Test Execution Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Time:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Reports:**" >> $GITHUB_STEP_SUMMARY
        echo "- [Cucumber Test Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

  # Optional: Code quality checks
  quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v3
    
    - name: ☕ Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 🔍 Compile Code
      run: mvn clean compile -B
    
    - name: ✅ Validate POM
      run: mvn validate
